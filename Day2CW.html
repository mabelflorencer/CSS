<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model</title>
    <style>
        body {
            background-color: lightcoral;
            text-align: center;
            margin: 100px;
            border: 5px solid black;
        }
        .outer-box {
            border: 5px solid blue;
            padding: 20px;
            background-color: aliceblue;
        }
        .middle-box {
            border: 4px solid rgb(49, 249, 4);
            padding: 20px;
            background-color: rgb(57, 116, 76)
        }
        .inner-box {
            border: 3px solid red;
            padding: 20px;
            background-color: lightyellow;
        }
    </style>
</head>
<body>
    <div class="outer-box">
        <div class="middle-box">
            <div class="inner-box">
                <h2>Inner Box</h2>
                <p>This is a box model example.</p>
            </div>
        </div>
    </div>
</body>
</html>
