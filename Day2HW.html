<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product card</title>
    <style>
        body {
            background-color:bisque;
            font-family:'Courier New', Courier, monospace;
            border: 5px solid black;
        }
        .card {
            width: 500px;
            height: 500px;
            border-radius: 20px;
            border: 5px solid navy;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        .image {
            max-width: 100%;
            min-width: 100px;
            height: 200px;
        }
        h2{ color: darkgreen;}
        p { color: darkred;}
    </style>
</head>
<body>
    <div class="card">
        <img src="bmw-m4-csl-teaser-front.jpg" alt="BMW M4 CSL" class="image">
        <h2>BMW M4 CSL</h2>
        <p>The BMW M4 CSL is a high-performance sports car that combines power, precision, and luxury. It features a lightweight design, advanced aerodynamics, and a powerful engine that delivers an exhilarating driving experience.</p>
    </div>
</body>
</html>
