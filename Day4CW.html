<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Notice</title>
    <style>
        body {
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: #f2f2f2;
        }
        h2 {
            text-align: center;
            font-size: 50px;
            color: darkblue;
        }
        .notice-box {
            width: 70%;
            height: 250px;
            margin: 20px auto;
            padding: 30px;
            background-color: rgb(186, 243, 224);
            border: 2px solid black;
            position: relative;
            overflow: auto;
        }
        .notice-image {
            width:150px;
            height: 200px;
            float: left;
            margin-right: 20px;
        }
        .badge {
            position:absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .clear {
            clear: both;
        }
    </style>
</head>
<body>
    <h2>Important Notice</h2>

    <div class="notice-box">
        <div class="badge">NEW</div>
        <img class="notice-image" src="https://static.vecteezy.com/system/resources/previews/050/751/636/non_2x/education-and-learning-visuals-of-school-buildings-and-classrooms-free-photo.jpg">
        <p>
            Dear Students, the school will remain closed on Friday due to maintenance work.
            Regular classes will resume on Monday. Please complete your assignments and
            submit them on the next working day. Keep checking the school website for
            further announcements and examination updates.
        </p>
        <div class="clear"></div>
    </div>
</body>
</html>
